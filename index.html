<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>漢字ドリル自動生成</title>
<style>
  :root{
    --navy:#22334a;
    --line:#c9cdd4;
    --accent:#e8b13a;
  }
  * { box-sizing: border-box; }
  body{
    font-family: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:#eef0f3;
    margin:0;
    color:#222;
  }
  .app{
    max-width: 1000px;
    margin: 0 auto;
    padding: 24px;
  }
  h1{
    font-size: 20px;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .sub{
    color:#666;
    font-size:13px;
    margin-bottom:20px;
  }
  .panel{
    background:#fff;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .panel h2{
    font-size:15px;
    color:var(--navy);
    margin:0 0 12px;
    border-left: 4px solid var(--accent);
    padding-left:8px;
  }
  .row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:12px; color:#555; }
  .field input, .field textarea{
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 8px;
    font-size:14px;
    font-family: inherit;
  }
  .field.kanji input{ width:60px; font-size:22px; text-align:center; }
  .field.small input{ width:110px; }
  .field.wide input, .field.wide textarea{ width:100%; }

  #wordTable{ width:100%; border-collapse:collapse; margin-bottom:10px; }
  #wordTable th{ font-size:12px; color:#555; text-align:left; padding:4px 6px; }
  #wordTable td{ padding:4px 6px; }
  #wordTable input{ width:100%; border:1px solid var(--line); border-radius:6px; padding:5px 7px; font-size:13px; }
  #wordTable input.word{ width:90px; font-size:15px; }
  #wordTable input.reading{ width:100px; }
  .rmBtn{ background:none;border:none;color:#c0392b;cursor:pointer;font-size:16px; }

  button.action{
    background: var(--navy);
    color:#fff;
    border:none;
    border-radius:6px;
    padding:9px 16px;
    font-size:14px;
    cursor:pointer;
    margin-right:8px;
  }
  button.action.secondary{ background:#6b7686; }
  button.action.warn{ background:#b5551f; }
  button.ghost{
    background:#fff; border:1px solid var(--line); border-radius:6px;
    padding:6px 12px; font-size:13px; cursor:pointer; color:#333;
  }
  button.presetBtn{
    background:#fff; border:1px solid var(--line); border-radius:8px;
    width:44px; height:44px; font-size:20px; cursor:pointer; color:var(--navy);
  }
  button.presetBtn.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .presetItem{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .presetItem .presetChk{ width:16px; height:16px; cursor:pointer; }
  .batchBar{
    display:flex; align-items:center; gap:10px; margin-top:10px;
    padding-top:10px; border-top:1px dashed var(--line);
  }

  .checkCol{ width:40px; text-align:center; }
  .hint{ font-size:12px; color:#888; margin-top:4px; }

  /* ---- printable sheet ---- */
  #sheetWrap{ display:flex; flex-direction:column; align-items:center; gap:24px; }
  .sheet{
    background:#fff;
    width: 210mm;
    min-height: 297mm;
    padding: 14mm;
    box-shadow: 0 1px 6px rgba(0,0,0,.15);
  }
  .sheetHead{
    display:flex; justify-content:space-between; align-items:flex-start;
    border-bottom: 2px solid var(--navy);
    padding-bottom:6px;
    margin-bottom:10px;
  }
  .sheetTitle{ font-size:14px; color:#555; }
  .sheetTitle b{ color:var(--navy); font-size:16px; }
  .sheetMeta{ font-size:11px; color:#777; text-align:right; }

  .topGrid{ display:flex; gap:16px; margin-bottom:16px; }
  .kanjiBig{
    width:90px; height:90px;
    border:2px solid var(--navy);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:58px;
    position:relative;
    flex:none;
    background:#fff;
  }
  .infoBox{
    flex:1;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 12px;
    font-size:12.5px;
    line-height:1.9;
  }
  .infoBox .lbl{ color:var(--navy); font-weight:bold; margin-right:6px; }

  .traceRow{ display:flex; gap:8px; margin-bottom:16px; }
  .traceBox{
    width:64px; height:64px;
    border:1px solid var(--line);
    position:relative;
    background:#fff;
  }
  .traceBox::before, .traceBox::after{
    content:""; position:absolute; background:#d8dbe0;
  }
  .traceBox::before{ left:50%; top:0; bottom:0; width:1px; transform:translateX(-.5px); }
  .traceBox::after{ top:50%; left:0; right:0; height:1px; transform:translateY(-.5px); }
  .traceBox span{
    position:relative; z-index:1;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:40px; color:#dcdfe3;
  }
  .traceBox.blank span{ visibility:hidden; }

  .meaningBox{
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 12px;
    font-size:12.5px;
    margin-bottom:16px;
  }
  .meaningBox .lbl{ color:var(--navy); font-weight:bold; }

  .practiceLabel{ font-size:14px; color:var(--navy); font-weight:800; margin:2px 0 5px; }

  .testList{ margin-bottom:6px; }
  .testRow{
    display:flex; align-items:center; gap:10px;
    padding:5px 0; border-bottom:1px dashed var(--line);
  }
  .testNum{ width:16px; font-size:11px; color:#999; flex:none; }
  .testMeaning{ width:270px; font-size:11.5px; color:#333; line-height:1.35; flex:none; }
  .testAnswer{ display:flex; align-items:center; gap:8px; flex:1; }
  .testWord{ display:flex; }
  .charBox{
    width:28px; height:28px;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; color:#333;
    margin-right:-1px;
    position:relative;
    background:#fff;
  }
  .readingHint{
    font-size:13px; color:#888; letter-spacing:1px;
  }
  .answerList{
    display:grid; grid-template-columns: repeat(2, 1fr); gap:2px 28px;
  }
  .answerRow{
    display:flex; align-items:baseline; gap:10px;
    padding:8px 0; border-bottom:1px dashed var(--line);
  }
  .answerNum{ width:22px; font-size:12px; color:#999; flex:none; }
  .answerWord{ font-size:18px; font-weight:bold; color:var(--navy); }
  .answerReading{ font-size:13px; color:#777; }

  @media print{
    body{ background:#fff; }
    .app > .panel, .app h1, .app .sub, #controls{ display:none !important; }
    #sheetWrap{ display:block; }
    .sheet{ box-shadow:none; width:auto; min-height:auto; padding:0; margin:0; page-break-after:always; }
    .sheet:last-child{ page-break-after:auto; }
    @page{ size:A4; margin:12mm; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>漢字ドリル自動生成</h1>
  <div class="sub">写真の教材の内容を入力すると、印刷用の漢字プリントを作ります。作成後は「印刷する（PDF保存）」でブラウザの印刷機能からPDF化できます。</div>

  <div class="panel" id="controls">
    <h2>保存済みの漢字から選ぶ</h2>
    <div class="hint" style="margin-bottom:8px">クリック＝編集する漢字を切り替え。チェック＝まとめて印刷する漢字を選択。</div>
    <div class="row" id="presetRow"></div>
    <div class="batchBar">
      <button class="ghost" onclick="selectAllPresets(true)">全部チェック</button>
      <button class="ghost" onclick="selectAllPresets(false)">チェックを外す</button>
      <button class="action" onclick="batchRender('trace')">選んだ漢字の書き方シートをまとめて作成</button>
      <button class="action" onclick="batchRender('test')">選んだ漢字の熟語テストをまとめて作成</button>
      <button class="action warn" onclick="poolRandomTest()">選んだ漢字をシャッフルして1枚のランダムテストを作成</button>
    </div>
    <div class="hint">熟語テストは作成のたびに出題順が自動でシャッフルされます。</div>

    <h2>① 漢字の基本情報</h2>
    <div class="row">
      <div class="field kanji"><label>漢字</label><input id="kanji" value="推"></div>
      <div class="field small"><label>音読み</label><input id="onyomi" value="スイ"></div>
      <div class="field small"><label>訓読み</label><input id="kunyomi" value="お-す"></div>
      <div class="field small"><label>画数</label><input id="strokes" value="11画"></div>
      <div class="field small"><label>部首</label><input id="radical" value="扌（てへん）"></div>
      <div class="field wide" style="flex:1 1 100%"><label>筆順（読点区切り）</label><input id="order" value="一,十,扌,扌,扩,扑,扑,推,推,推,推"></div>
      <div class="field wide" style="flex:1 1 100%"><label>意味</label><textarea id="meaning" rows="2">おす。おしすすめる。考えをめぐらす。人にすすめる。</textarea></div>
    </div>

    <h2>② 熟語（用例）</h2>
    <table id="wordTable">
      <thead><tr><th class="checkCol">✕</th><th>熟語</th><th>読み方</th><th>意味</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
    <button class="ghost" onclick="addWordRow()">＋ 熟語を追加</button>
    <div class="hint">左端の「✕」にチェックを入れると、その熟語だけを集めた「まちがい直しプリント」を作れます。</div>

    <h2 style="margin-top:18px">③ 出力</h2>
    <button class="action" onclick="renderTraceSheet()">①書き方の練習シートを作成（見本の漢字つき）</button>
    <button class="action" onclick="renderSheet(false)">②熟語テストを作成（漢字は答え無し）</button>
    <button class="action warn" onclick="renderSheet(true)">③✕がついた熟語だけで復習テストを作成</button>
    <button class="action secondary" onclick="window.print()">印刷する（PDF保存）</button>
    <div class="hint">※②③のテストシートには見本の漢字は出てきません。答え合わせは一番下の小さい文字を見てください。</div>
  </div>

  <div id="sheetWrap"></div>
</div>

<script>

  "域": {

let currentKanji = null;

function renderPresetButtons(){
  const row = document.getElementById("presetRow");
  row.innerHTML = Object.keys(PRESETS).map(k => `
    <div class="presetItem">
      <input type="checkbox" class="presetChk" data-k="${k}">
      <button type="button" class="presetBtn" data-k="${k}" onclick="loadPreset('${k}')">${k}</button>
    </div>
  `).join("");
}

function selectAllPresets(on){
  [...document.querySelectorAll(".presetChk")].forEach(c => c.checked = on);
}

function readForm(){
  return {
    kanji: document.getElementById("kanji").value.trim(),
    onyomi: document.getElementById("onyomi").value.trim(),
    kunyomi: document.getElementById("kunyomi").value.trim(),
    strokes: document.getElementById("strokes").value.trim(),
    radical: document.getElementById("radical").value.trim(),
    order: document.getElementById("order").value.trim(),
    meaning: document.getElementById("meaning").value.trim(),
    words: collectWords(),
  };
}

function syncFormToPreset(){
  if(!currentKanji) return;
  const d = readForm();
  PRESETS[currentKanji] = {
    onyomi: d.onyomi, kunyomi: d.kunyomi, strokes: d.strokes,
    radical: d.radical, order: d.order, meaning: d.meaning,
    words: d.words.map(w => ({word:w.word, reading:w.reading, def:w.def})),
  };
}

function loadPreset(k){
  const p = PRESETS[k];
  if(!p) return;
  syncFormToPreset();
  currentKanji = k;
  document.getElementById("kanji").value = k;
  document.getElementById("onyomi").value = p.onyomi;
  document.getElementById("kunyomi").value = p.kunyomi;
  document.getElementById("strokes").value = p.strokes;
  document.getElementById("radical").value = p.radical;
  document.getElementById("order").value = p.order;
  document.getElementById("meaning").value = p.meaning;
  document.querySelector("#wordTable tbody").innerHTML = "";
  p.words.forEach(addWordRow);
  [...document.querySelectorAll(".presetBtn")].forEach(b => b.classList.toggle("active", b.dataset.k === k));
  renderSheet(false);
}

function addWordRow(data){
  const tbody = document.querySelector("#wordTable tbody");
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="checkCol"><input type="checkbox" class="wrongChk"></td>
    <td><input class="word" value="${data?.word ?? ""}"></td>
    <td><input class="reading" value="${data?.reading ?? ""}"></td>
    <td><input class="def" value="${data?.def ?? ""}" style="width:100%"></td>
    <td><button class="rmBtn" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function collectWords(){
  return [...document.querySelectorAll("#wordTable tbody tr")].map(tr => ({
    word: tr.querySelector(".word").value.trim(),
    reading: tr.querySelector(".reading").value.trim(),
    def: tr.querySelector(".def").value.trim(),
    wrong: tr.querySelector(".wrongChk").checked,
  })).filter(w => w.word);
}

function blankBoxes(len){
  return Array.from({length: len}).map(() => `<div class="charBox"></div>`).join("");
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildTraceHtml(d){
  const traceBoxes = Array.from({length:5}, (_,i) =>
    `<div class="traceBox ${i<2?"":"blank"}"><span>${d.kanji}</span></div>`
  ).join("");

  return `
    <div class="sheet">
      <div class="sheetHead">
        <div class="sheetTitle"><b>漢字れんしゅうプリント</b><br>書き方の練習</div>
        <div class="sheetMeta">なまえ：＿＿＿＿＿＿＿＿＿＿＿＿</div>
      </div>

      <div class="topGrid">
        <div class="kanjiBig">${d.kanji}</div>
        <div class="infoBox">
          <span class="lbl">音読み</span>${d.onyomi || "―"}
          <span class="lbl">訓読み</span>${d.kunyomi || "―"}<br>
          <span class="lbl">画数</span>${d.strokes || "―"}
          <span class="lbl">部首</span>${d.radical || "―"}<br>
          <span class="lbl">筆順</span>${d.order || "―"}
        </div>
      </div>

      <div class="practiceLabel">書いてれんしゅうしよう</div>
      <div class="traceRow">${traceBoxes}</div>

      ${d.meaning ? `<div class="meaningBox"><span class="lbl">意味　</span>${d.meaning}</div>` : ""}
    </div>
  `;
}

function buildTestHtml(kanji, allWords, wrongOnly){
  let words = allWords;
  let mode = "熟語テスト";
  if(wrongOnly){
    words = words.filter(w => w.wrong);
    mode = "まちがい直しテスト";
    if(words.length === 0) return null;
  }
  words = shuffle(words);

  const repeatPerWord = wrongOnly ? 3 : 1;

  let n = 0;
  const numbered = [];
  words.forEach(w => {
    for(let i = 0; i < repeatPerWord; i++){
      n++;
      numbered.push({n, word:w.word, reading:w.reading, def:w.def});
    }
  });

  const testRowsHtml = numbered.map(r => `
        <div class="testRow">
          <div class="testNum">${r.n}</div>
          <div class="testMeaning">${r.def}</div>
          <div class="testAnswer">
            <div class="testWord">${blankBoxes(r.word.length)}</div>
            <div class="readingHint">（${r.reading}）</div>
          </div>
        </div>`).join("");

  const testSheet = `
    <div class="sheet">
      <div class="sheetHead">
        <div class="sheetTitle"><b>漢字れんしゅうプリント</b><br>${kanji ? kanji+"　" : ""}${mode}</div>
        <div class="sheetMeta">なまえ：＿＿＿＿＿＿＿＿＿＿＿＿</div>
      </div>

      <div class="practiceLabel">意味を読んで、熟語の漢字を書こう</div>
      <div class="testList">${testRowsHtml}</div>
    </div>
  `;

  const answerRowsHtml = numbered.map(r => `
        <div class="answerRow">
          <span class="answerNum">${r.n}</span>
          <span class="answerWord">${r.word}</span>
          <span class="answerReading">（${r.reading}）</span>
        </div>`).join("");

  const answerSheet = `
    <div class="sheet">
      <div class="sheetHead">
        <div class="sheetTitle"><b>漢字れんしゅうプリント</b><br>${kanji ? kanji+"　" : ""}${mode}　こたえ</div>
        <div class="sheetMeta">保護者用</div>
      </div>

      <div class="practiceLabel">こたえ</div>
      <div class="answerList">${answerRowsHtml}</div>
    </div>
  `;

  return {test: testSheet, answer: answerSheet};
}

function renderTraceSheet(){
  const html = buildTraceHtml(readForm());
  document.getElementById("sheetWrap").innerHTML = html;
  document.getElementById("sheetWrap").scrollIntoView({behavior:"smooth"});
}

function renderSheet(wrongOnly){
  const d = readForm();
  const built = buildTestHtml(null, d.words, wrongOnly);
  if(!built){
    alert("✕チェックがついた熟語がありません。表の左端にチェックを入れてください。");
    return;
  }
  document.getElementById("sheetWrap").innerHTML = built.test + built.answer;
  document.getElementById("sheetWrap").scrollIntoView({behavior:"smooth"});
}

function batchRender(kind){
  syncFormToPreset();
  const keys = [...document.querySelectorAll(".presetChk")].filter(c => c.checked).map(c => c.dataset.k);
  if(keys.length === 0){
    alert("まとめて印刷する漢字にチェックを入れてください。");
    return;
  }
  if(kind === "trace"){
    const parts = keys.map(k => buildTraceHtml({kanji:k, ...PRESETS[k]}));
    document.getElementById("sheetWrap").innerHTML = parts.join("");
  } else {
    const built = keys.map(k => buildTestHtml(k, PRESETS[k].words, false)).filter(Boolean);
    document.getElementById("sheetWrap").innerHTML =
      built.map(b => b.test).join("") + built.map(b => b.answer).join("");
  }
  document.getElementById("sheetWrap").scrollIntoView({behavior:"smooth"});
}

function poolRandomTest(){
  syncFormToPreset();
  const keys = [...document.querySelectorAll(".presetChk")].filter(c => c.checked).map(c => c.dataset.k);
  if(keys.length === 0){
    alert("ランダムテストに使う漢字にチェックを入れてください。");
    return;
  }
  const pool = keys.flatMap(k => PRESETS[k].words.map(w => ({...w})));
  const built = buildTestHtml("ランダム総合", pool, false);
  document.getElementById("sheetWrap").innerHTML = built.test + built.answer;
  document.getElementById("sheetWrap").scrollIntoView({behavior:"smooth"});
}

renderPresetButtons();
loadPreset("推");
</script>
</body>
</html>
